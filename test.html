<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebGL2 Grid Demo (HTML)</title>
<style>
  body, html {
    margin:0; padding:0;
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
  }
  #glcanvas {
    width:100%;
    height:100%;
    display:block;
  }
</style>
</head>
<body>

<canvas id="glcanvas"></canvas>

<script>

// -------------------------
//  Images
// -------------------------
const ITEMS = [
  { src: "https://picsum.photos/500/700?1", title:"User 1" },
  { src: "https://picsum.photos/500/700?2", title:"User 2" },
  { src: "https://picsum.photos/500/700?3", title:"User 3" },
  { src: "https://picsum.photos/500/700?4", title:"User 4" },
  { src: "https://picsum.photos/500/700?5", title:"User 5" },
  { src: "https://picsum.photos/500/700?6", title:"User 6" },
  { src: "https://picsum.photos/500/700?7", title:"User 7" },
  { src: "https://picsum.photos/500/700?8", title:"User 8" }
];

const columns = 3;
const cellW = 240;
const cellH = 300;

// -------------------------
//  Build Atlas (HTML Canvas)
// -------------------------
async function buildAtlas(items) {
  const rows = Math.ceil(items.length / columns);
  const atlas = document.createElement("canvas");
  atlas.width  = columns * cellW;
  atlas.height = rows * cellH;
  const ctx = atlas.getContext("2d");
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,atlas.width, atlas.height);

  const loaded = await Promise.all(items.map(i => new Promise(res => {
    const img = new Image();
    img.crossOrigin="anonymous";
    img.onload = () => res(img);
    img.onerror = () => res(img);
    img.src = i.src;
  })));

  loaded.forEach((img, i) => {
    const col = i % columns;
    const row = Math.floor(i / columns);
    const x = col * cellW;
    const y = row * cellH;

    // draw image cover-fit
    const r = Math.max(cellW / img.width, (cellH * 0.8) / img.height);
    const iw = img.width * r;
    const ih = img.height * r;
    ctx.drawImage(img, x + (cellW - iw) / 2, y + (cellH * 0.8 - ih) / 2, iw, ih);

    // simple gradient overlay
    const g = ctx.createLinearGradient(x, y+cellH*0.4, x, y+cellH);
    g.addColorStop(0,"rgba(0,0,0,0)");
    g.addColorStop(1,"rgba(0,0,0,0.85)");
    ctx.fillStyle = g;
    ctx.fillRect(x, y+cellH*0.4, cellW, cellH*0.6);

    ctx.fillStyle = "#fff";
    ctx.font = "18px sans-serif";
    ctx.fillText(items[i].title, x+10, y+cellH-10);
  });

  return { atlas, rows };
}

// -------------------------
//  WebGL2
// -------------------------
const vsSrc = `#version 300 es
precision highp float;

layout(location=0) in vec2 aPos;     // quad: [0..1]
layout(location=1) in vec2 aOff;     // instance offset
layout(location=2) in vec2 aSize;    // instance size
layout(location=3) in vec4 aUV;      // atlas rect

uniform vec2 uRes;

out vec2 vUv;
flat out vec4 vRect;

void main() {
  vec2 posPx = aOff + aPos * aSize;
  vec2 clip = (posPx / uRes) * 2.0 - 1.0;
  gl_Position = vec4(clip.x, -clip.y, 0, 1);
  vUv = aPos;
  vRect = aUV;
}
`;

const fsSrc = `#version 300 es
precision highp float;

in vec2 vUv;
flat in vec4 vRect;
uniform sampler2D uAtlas;

out vec4 outColor;

void main(){
  vec2 uv = vRect.xy + vRect.zw * vUv;
  vec4 col = texture(uAtlas, uv);

  // gradient shading
  float g = smoothstep(0.45,1.0,vUv.y);
  vec3 rgb = mix(col.rgb, vec3(0,0,0.85), g);
  outColor = vec4(rgb,1.0);
}
`;

function compile(gl, type, src){
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(sh));
  }
  return sh;
}

function createProgram(gl, vsSrc, fsSrc){
  const vs = compile(gl, gl.VERTEX_SHADER, vsSrc);
  const fs = compile(gl, gl.FRAGMENT_SHADER, fsSrc);
  const pr = gl.createProgram();
  gl.attachShader(pr, vs);
  gl.attachShader(pr, fs);
  gl.linkProgram(pr);
  if(!gl.getProgramParameter(pr, gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(pr));
  }
  return pr;
}

// -------------------------
//  Main
// -------------------------
(async function(){

  const { atlas, rows } = await buildAtlas(ITEMS);

  const canvas = document.getElementById("glcanvas");
  const gl = canvas.getContext("webgl2");
  const DPR = window.devicePixelRatio || 1;

  function resize() {
    canvas.width = innerWidth * DPR;
    canvas.height = innerHeight * DPR;
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  resize();
  addEventListener('resize', resize);

  const prog = createProgram(gl, vsSrc, fsSrc);
  gl.useProgram(prog);

  // upload atlas
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, atlas);
  gl.generateMipmap(gl.TEXTURE_2D);

  // quad
  const quad = new Float32Array([
    0,0,  1,0,  0,1,
    0,1,  1,0,  1,1
  ]);
  const quadVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadVBO);
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

  // instance buffers
  const count = ITEMS.length;
  const offsets = new Float32Array(count*2);
  const sizes   = new Float32Array(count*2);
  const rects   = new Float32Array(count*4);

  // initial layout
  for(let i=0;i<count;i++){
    const col = i % columns;
    const row = Math.floor(i / columns);
    offsets[i*2+0] = col * (cellW + 20) + 20;
    offsets[i*2+1] = row * (cellH + 20) + 20;
    sizes[i*2+0] = cellW;
    sizes[i*2+1] = cellH;

    const u = (col*cellW)/atlas.width;
    const v = (row*cellH)/atlas.height;
    const w = cellW/atlas.width;
    const h = cellH/atlas.height;
    rects.set([u,v,w,h], i*4);
  }

  // upload instance buffers
  const offVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, offVBO);
  gl.bufferData(gl.ARRAY_BUFFER, offsets, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(1);
  gl.vertexAttribPointer(1,2,gl.FLOAT,false,0,0);
  gl.vertexAttribDivisor(1,1);

  const sizeVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, sizeVBO);
  gl.bufferData(gl.ARRAY_BUFFER, sizes, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(2);
  gl.vertexAttribPointer(2,2,gl.FLOAT,false,0,0);
  gl.vertexAttribDivisor(2,1);

  const rectVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, rectVBO);
  gl.bufferData(gl.ARRAY_BUFFER, rects, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(3);
  gl.vertexAttribPointer(3,4,gl.FLOAT,false,0,0);
  gl.vertexAttribDivisor(3,1);

  const uRes = gl.getUniformLocation(prog,"uRes");

  function draw(){
    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.drawArraysInstanced(gl.TRIANGLES, 0, 6, count);
    requestAnimationFrame(draw);
  }
  draw();

})();
</script>

</body>
</html>
